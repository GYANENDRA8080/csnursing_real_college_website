{% extends 'college/base.html' %}
{% block content %}

<style>
/* Background Gradient */
body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* Card Design */
.admission-card{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius:15px;
    padding:40px;
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
    color:white;
}

/* Heading */
.form-title{
    font-weight:700;
    text-align:center;
    margin-bottom:25px;
}

/* Input Style */
.form-control{
    background:rgba(255,255,255,0.1);
    border:none;
    color:white;
    padding:12px;
    border-radius:8px;
}

.form-control::placeholder{
    color:#ddd;
}

/* Focus Effect */
.form-control:focus{
    background:rgba(255,255,255,0.15);
    box-shadow:none;
    border:1px solid #00d4ff;
    color:white;
}

/* Button Style */
.btn-admission{
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    border:none;
    padding:12px;
    font-weight:600;
    border-radius:8px;
    transition:.3s;
}

.btn-admission:hover{
    transform:scale(1.05);
    box-shadow:0 5px 20px rgba(0,114,255,0.5);
}
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height:90vh;">

    <div class="col-md-7">
        <div class="admission-card">

            <h2 class="form-title">🎓 Online Admission Form</h2>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <input class="form-control mb-3" name="name" placeholder="Full Name" required>

                <input class="form-control mb-3" type="email" name="email" placeholder="Email Address" required>

                <input class="form-control mb-3" name="phone" placeholder="Phone Number" required>

                <input class="form-control mb-3" name="course" placeholder="Course Applying For" required>

                <label class="mb-2">Upload Documents</label>
                <input class="form-control mb-4" type="file" name="documents" required>

                <button class="btn btn-admission w-100">
                    Submit Application
                </button>

            </form>

        </div>
    </div>

</div>

{% endblock %}
