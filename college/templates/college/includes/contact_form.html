{% load static %}
<form id="modal-contact-form" class="modal-form" method="post" action="/contact/" style="display:none;">
    {% csrf_token %}
    <h3>Contact / Enquiry</h3>

    <div class="field">
        <label>Name *</label>
        <input name="name" required type="text" placeholder="Your name">
    </div>

    <div class="grid-2">
        <div class="field">
            <label>Email *</label>
            <input name="email" required type="email" placeholder="Email">
        </div>
        <div class="field">
            <label>Phone</label>
            <input name="phone" type="tel" placeholder="Mobile number">
        </div>
    </div>

    <div class="field">
        <label>Message *</label>
        <textarea name="message" required placeholder="Write your message..."></textarea>
    </div>

    <div style="margin-top:12px; display:flex; gap:10px; justify-content:flex-end;">
        <button type="button" class="btn btn-secondary modal-close">Cancel</button>
        <button type="submit" class="btn btn-primary">Send Message</button>
    </div>
</form>
